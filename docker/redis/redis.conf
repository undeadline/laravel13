# Основные настройки
maxmemory 256mb
maxmemory-policy allkeys-lru

# Персистентность — для dev достаточно AOF
appendonly yes
appendfsync everysec

# Пароль (в проде обязательно через переменную окружения)
# requirepass secret

# Отключаем опасные команды
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""