server {
    listen 80;
    server_name localhost;

    root /var/www/public;
    index index.php;

    # Логи
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Максимальный размер загружаемых файлов
    client_max_body_size 100M;

    # ──────────────────────────────────────────
    # Статика — отдаём напрямую, без PHP
    # ──────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|ttf|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # ──────────────────────────────────────────
    # Все остальные запросы → PHP-FPM
    # ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # ──────────────────────────────────────────
    # Безопасность — закрываем служебное
    # ──────────────────────────────────────────

    # .env и скрытые файлы
    location ~ /\.(?!well-known) {
        deny all;
    }

    # vendor, storage — снаружи public не должны быть доступны
    # (они и так не в public, но на всякий случай)
    location ~* ^/(vendor|storage|bootstrap/cache) {
        deny all;
    }
}